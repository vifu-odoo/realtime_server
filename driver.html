<!DOCTYPE html>
<html>
<head>
    <title>Driver Tracking</title>
</head>
<body>

<h2>Driver Tracking Started...</h2>

<p id="status">Connecting...</p>
<p id="location">Waiting for GPS...</p>

<script>
    let ws;
    
    function startTracking() {
        const tracking_id = prompt("7a5631f8-c6df-4a5f-9718-3bbe715ea68d");
    
        if (!tracking_id) return;
    
        ws = new WebSocket(`wss://realtime-server-eo90.onrender.com/ws/${tracking_id}`);
    
        ws.onopen = () => {
            console.log("Connected to server");
            startGPS();
        };
    
        ws.onerror = (e) => {
            console.error("WebSocket error", e);
        };
    }
    
    function startGPS() {
        if (!navigator.geolocation) {
            alert("Geolocation not supported");
            return;
        }
    
        navigator.geolocation.watchPosition(
            (pos) => {
                const payload = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                };
    
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(payload));
                }
            },
            (err) => {
                console.error("GPS error:", err);
            },
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000,
            }
        );
    }
</script>

</body>
</html>
