<!DOCTYPE html>
<html>
<head>
    <title>Driver Tracking</title>
</head>
<body>

<h2>Driver Tracking</h2>

<p id="status">Initializing...</p>
<p id="location">Waiting for GPS...</p>

<button onclick="startTracking()">Start Tracking</button>

<script>
let ws;

function updateStatus(msg) {
    document.getElementById("status").innerText = msg;
}

function updateLocation(msg) {
    document.getElementById("location").innerText = msg;
}

function startTracking() {
    const tracking_id = prompt("Enter Tracking ID");

    if (!tracking_id) {
        updateStatus("Tracking ID missing");
        return;
    }

    updateStatus("Connecting to server...");

    ws = new WebSocket(`wss://realtime-server-eo90.onrender.com/ws/${tracking_id}`);

    ws.onopen = () => {
        updateStatus("✅ Connected");
        startGPS();
    };

    ws.onerror = (e) => {
        updateStatus("❌ WebSocket error");
        console.error(e);
    };

    ws.onclose = () => {
        updateStatus("⚠️ Connection closed");
    };
}

function startGPS() {
    if (!navigator.geolocation) {
        updateStatus("❌ Geolocation not supported");
        return;
    }

    updateStatus("📡 Tracking location...");

    navigator.geolocation.watchPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            updateLocation(`Lat: ${lat}, Lng: ${lng}`);

            const payload = { lat, lng };

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(payload));
            }
        },
        (err) => {
            updateStatus("❌ GPS error");
            console.error(err);
        },
        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000,
        }
    );
}
</script>

</body>
</html>
